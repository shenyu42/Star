<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星伴侶共享</title>
    <meta
      name="description"
      content="星伴侶共享的登入後主頁。"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="page">
    <main class="page-shell app-shell">
      <header class="panel topbar">
        <div>
          <p class="eyebrow">主頁</p>
          <h1 class="page-title">共享空間</h1>
        </div>

        <div class="topbar-actions">
          <div class="user-card">
            <span class="user-label">目前登入</span>
            <strong id="userEmail">載入中...</strong>
          </div>
          <button id="logoutButton" class="secondary-button" type="button">
            登出
          </button>
        </div>
      </header>

      <p id="appStatus" class="message" hidden></p>
      <p id="appFirebaseNotice" class="message" hidden></p>

      <section class="app-grid">
        <section class="panel">
          <div class="section-heading">
            <h2>情侶狀態</h2>
            <p>可以建立一組配對，或透過配對碼加入。</p>
          </div>

          <dl class="meta-list">
            <div>
              <dt>狀態</dt>
              <dd id="coupleStatusText">檢查中...</dd>
            </div>
            <div>
              <dt>配對碼</dt>
              <dd id="pairCodeValue">尚未提供</dd>
            </div>
            <div>
              <dt>成員數</dt>
              <dd id="memberCountValue">0</dd>
            </div>
          </dl>

          <div id="pairActions" class="stack">
            <button id="createCoupleButton" type="button">
              建立情侶配對
            </button>

            <form id="joinCoupleForm" class="stack">
              <label class="field">
                <span>輸入配對碼加入</span>
                <input
                  id="pairCodeInput"
                  name="pairCode"
                  type="text"
                  placeholder="請輸入配對碼"
                  autocomplete="off"
                  maxlength="12"
                  required
                />
              </label>

              <button type="submit" class="secondary-button">
                加入配對
              </button>
            </form>
          </div>

          <p id="coupleMessage" class="message" hidden></p>
        </section>

        <section id="eventPanel" class="panel">
          <div class="section-heading">
            <h2>共享事件</h2>
            <p>同一組情侶的兩位成員都會看到相同的共享事件資料。</p>
          </div>

          <form id="eventForm" class="stack">
            <input id="eventId" name="eventId" type="hidden" />

            <label class="field">
              <span>標題</span>
              <input
                id="eventTitle"
                name="title"
                type="text"
                placeholder="例如：電影之夜"
                required
              />
            </label>

            <div class="field-row">
              <label class="field">
                <span>開始時間</span>
                <input id="eventStartAt" name="startAt" type="datetime-local" required />
              </label>

              <label class="field">
                <span>結束時間</span>
                <input id="eventEndAt" name="endAt" type="datetime-local" />
              </label>
            </div>

            <label class="checkbox">
              <input id="eventAllDay" name="allDay" type="checkbox" />
              <span>全天事件</span>
            </label>

            <label class="field">
              <span>備註</span>
              <textarea
                id="eventNote"
                name="note"
                rows="4"
                placeholder="可選填備註"
              ></textarea>
            </label>

            <div class="button-row">
              <button id="saveEventButton" type="submit">儲存事件</button>
              <button
                id="cancelEditButton"
                class="secondary-button"
                type="button"
                hidden
              >
                取消編輯
              </button>
            </div>
          </form>

          <p id="eventMessage" class="message" hidden></p>
          <ul id="eventsList" class="item-list"></ul>
        </section>

        <section id="photoPanel" class="panel">
          <div class="section-heading">
            <h2>照片</h2>
            <p>圖片會儲存在雲端，並同步把照片資料寫入資料庫。</p>
          </div>

          <form id="photoForm" class="stack">
            <label class="field">
              <span>選擇圖片</span>
              <input id="photoFile" name="photo" type="file" accept="image/*" required />
            </label>

            <button type="submit">上傳照片</button>
          </form>

          <p id="photoMessage" class="message" hidden></p>
          <ul id="photosList" class="photo-list"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
